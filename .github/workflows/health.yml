name: Health check

# End-to-end read-only check against the live Yandex Wordstat API (oauth flavor →
# api.wordstat.yandex.net). The OAuth token is long-lived (~1 year), stored directly as a
# repo secret — no per-run minting (like mcp-yandex-metrica). smoke makes NO writes (pulls
# top requests for a sample phrase). Runs daily + manual dispatch only (never on push/PR):
# the secret is never exposed to PRs/forks and we don't spend Wordstat quota on every push.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.repository == 'askads/mcp-yandex-wordstat'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Read-only smoke check
        run: npm run smoke
        env:
          WORDSTAT_FLAVOR: oauth
          WORDSTAT_TOKEN: ${{ secrets.WORDSTAT_TOKEN }}
