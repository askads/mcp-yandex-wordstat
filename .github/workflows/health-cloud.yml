name: Health check (cloud)

# End-to-end read-only check against the live Yandex Cloud Search API v2 (cloud flavor →
# searchapi.api.cloud.yandex.net). Auth is a long-lived Yandex Cloud API key (Api-Key, scope
# yc.search-api.execute) + a folder id, stored as repo secrets — no per-run minting. Unlike
# the oauth flavor, this endpoint has a valid cert and is globally reachable (works from
# GitHub's US-hosted runners). smoke makes NO writes (pulls top requests for a sample phrase).
# Runs daily + manual dispatch only (never on push/PR), so secrets aren't exposed to PRs/forks.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.repository == 'askads/mcp-yandex-wordstat'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Read-only smoke check
        run: npm run smoke
        env:
          WORDSTAT_FLAVOR: cloud
          WORDSTAT_API_KEY: ${{ secrets.WORDSTAT_API_KEY }}
          WORDSTAT_FOLDER_ID: ${{ secrets.WORDSTAT_FOLDER_ID }}
