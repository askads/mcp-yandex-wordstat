name: Health check (oauth)

# Read-only check against the live Yandex Wordstat API (oauth flavor → api.wordstat.yandex.net).
# The server code is correct — host/path/Bearer match the official docs
# (https://yandex.com/support2/wordstat/ru/content/api-structure) — BUT this endpoint needs
# approved access (a request to Yandex Direct support: login + app ClientId) and is not
# reliably reachable from GitHub's US-hosted runners (it serves a website cert / 404 to
# unapproved / non-RU clients). So this check is **manual-dispatch only**: run it from an
# approved, RU-reachable context. The cloud flavor (health-cloud.yml) is the one on schedule.
# Token lives in the WORDSTAT_TOKEN secret.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.repository == 'askads/mcp-yandex-wordstat'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Read-only smoke check
        run: npm run smoke
        env:
          WORDSTAT_FLAVOR: oauth
          WORDSTAT_TOKEN: ${{ secrets.WORDSTAT_TOKEN }}
